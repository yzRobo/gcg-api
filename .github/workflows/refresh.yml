name: refresh-gundam-data
on:
  schedule:
    - cron: '0 6 * * 1'      # every Monday 06:00 UTC
  workflow_dispatch: {}       # manual trigger button
permissions:
  contents: write             # REQUIRED: new repos default GITHUB_TOKEN to read-only, which would 403 the data commit and the Release publish
concurrency:
  group: refresh              # never let a manual run overlap the cron run
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci           # requires package-lock.json to be committed (run npm install locally once and commit the lockfile)
      - name: Scrape + build artifacts (fails loudly on sanity error)
        # tee the build log so the next step can surface product-data degradation as annotations.
        # CRITICAL: `shell: bash` + explicit `set -o pipefail` is REQUIRED here. A run step with NO
        # shell key runs `bash -e {0}` (errexit but NO pipefail), so `node ... | tee` would exit with
        # tee's 0 and a sanity-gate failure would go GREEN and silently re-publish stale data. Only
        # `shell: bash` gives `bash --noprofile --norc -eo pipefail {0}`; set -o pipefail is belt-and-
        # braces. This keeps the "fails loudly" guarantee intact through the pipe.
        shell: bash
        run: |
          set -o pipefail
          node src/cli.js 2>&1 | tee "$RUNNER_TEMP/build.log"
        env:
          DATASET_VERSION: ${{ github.run_number }}-${{ github.sha }}
      - name: Surface product-data degradation on the run summary
        # Products are SUPPLEMENTARY (cards already passed their sanity gate above), so a products
        # warning must NOT fail the run - it is promoted to a GitHub ::warning:: annotation instead,
        # visible on the run summary without opening the log. Catches zero-guard / shrink-guard /
        # union-fallback / skipped-item warnings and a supplementary scrape failure.
        run: |
          log="$RUNNER_TEMP/build.log"
          if [ ! -f "$log" ]; then echo "no build log; skipping"; exit 0; fi
          matches=$(grep -iE '(warning|failed)' "$log" | grep -iE 'product' || true)
          if [ -n "$matches" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::warning title=Products data degraded::${line}"
            done <<< "$matches"
          else
            echo "No product-data warnings."
          fi
      - name: Generate D1 import SQL
        run: node scripts/gen-sql.js
        env:
          DATASET_VERSION: ${{ github.run_number }}-${{ github.sha }}
      - name: Push data into D1
        run: npx wrangler d1 execute gundam-cards --remote --file ../data/import.sql -y
        working-directory: worker   # picks up worker/wrangler.toml; npx resolves wrangler from the root node_modules
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Worker with new DATASET_VERSION (busts edge cache)
        run: npx wrangler deploy --var DATASET_VERSION:${{ github.run_number }}-${{ github.sha }}
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Commit refreshed data files
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add data/
          git commit -m "data: weekly refresh (run ${{ github.run_number }})" || echo "no changes to commit"
          git pull --rebase origin ${{ github.ref_name }} || true   # tolerate the repo advancing mid-run (avoids a non-fast-forward push failure)
          git push
      - name: Publish rolling Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          files: |
            data/cards.ndjson
            data/cards.json
            data/manifest.json
            data/rulings.json
            data/products.json
